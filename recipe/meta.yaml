{% set name = "sos-papermill" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 010fb490efb7b89eaf06eff9ae8e7424d2c4d22e627adc867becabb736fe9937

build:
  noarch: python
  number: 1
  script:
    - {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - sos-notebook
    - python >={{ python_min }}
    - papermill

test:
  requires:
    - nose
    - pytest
    - nbformat
    - mock
    - python {{ python_min }}
  imports:
    - sos_papermill

about:
  home: https://github.com/vatlab/sos-papermill
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: SoS engine for papermill
  doc_url: https://vatlab.github.io/sos-docs/
  dev_url: https://github.com/vatlab/sos-papermill

extra:
  recipe-maintainers:
    - BoPeng
